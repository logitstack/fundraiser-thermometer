<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundraiser Thermometer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Playfair+Display:wght@700;900&family=Dancing+Script:wght@600;700&family=Anton&family=Moontime&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0B1628;
            --fill: #4FC3F7;
            --title-color: #F5A623;
            --glass: rgba(255,255,255,0.06);
            --glass-border: rgba(255,255,255,0.12);
            --gold: #F5A623;
        }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(79,195,247,0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(245,166,35,0.05) 0%, transparent 50%);
            overflow: hidden;
        }

        /* ── STAGE LAYOUT ─────────────────────────────────── */
        .stage {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            position: relative;
            gap: 0;
            transition: gap 0.6s cubic-bezier(.4,0,.2,1);
        }

        .stage.qr-open {
            gap: 60px;
        }

        /* ── THERMOMETER WRAPPER ──────────────────────────── */
        .therm-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: transform 0.6s cubic-bezier(.4,0,.2,1);
            flex-shrink: 0;
        }

        /* ── THERMOMETER CONTAINER ────────────────────────── */
        .thermometer-container {
            position: relative;
            width: 210px;
            height: 640px;
            transform-origin: center bottom;
        }

        .fundraiser-title {
            position: absolute;
            bottom: -90px;
            width: 600px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 46px;
            color: var(--title-color);
            font-family: 'Dancing Script', cursive;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 2px 20px rgba(245,166,35,0.4);
            white-space: nowrap;
        }

        .goal {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translate(-50%, calc(-100% - 24px));
            text-align: center;
            font-size: clamp(18px, 2.5vw, 28px);
            color: rgba(255,255,255,0.85);
            font-family: 'Moontime', cursive;
            white-space: nowrap;
            letter-spacing: 1px;
        }

        /* ── THERMOMETER BODY ─────────────────────────────── */
        .thermometer { display: block; position: relative; height: 560px; width: 210px; }

        /* Single SVG replaces all CSS stem/bulb/connector elements */
        .therm-svg {
            position: absolute;
            left: 0; top: 0;
            width: 210px; height: 560px;
            overflow: visible;
        }

        /* liquid surface */
        .liquid-surface {
            position: absolute;
            left: 84px;
            width: 42px;
            height: 28px;
            bottom: 100px;
            z-index: 10;
            transition: bottom 1s cubic-bezier(.2,.9,.25,1.1), opacity 0.4s ease;
            overflow: hidden;
        }
        .wave-container { position: absolute; left: 0; top: 0; width: 48px; height: 28px; }
        .wave { position: absolute; inset: 0; background-size: 48px 100%; background-repeat: repeat-x; }
        .wave.one {
            /* fill = same as main fill colour (#4FC3F7) so crests match the water body */
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 28" preserveAspectRatio="none"><path d="M0 14 Q 6 6 12 14 T 24 14 T 36 14 T 48 14 V28 H0 Z" fill="%234FC3F7"/></svg>');
            animation: drift 4s linear infinite;
        }
        .wave.two {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 28" preserveAspectRatio="none"><path d="M0 17 Q 6 8 12 17 T 24 17 T 36 17 T 48 17 V28 H0 Z" fill="%234FC3F7"/></svg>');
            animation: drift 5s linear infinite reverse;
        }
        @keyframes drift { from { background-position-x: 0; } to { background-position-x: -48px; } }

        /* labels on stem */
        .percentage {
            position: absolute;
            left: -10px;
            background: rgba(255,255,255,0.95);
            color: #0B1628;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 18px;
            font-family: 'Inter', sans-serif;
            transition: bottom 0.7s cubic-bezier(.2,.9,.25,1.1);
            bottom: 98px;
            z-index: 25;
            white-space: nowrap;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }
        .percentage::after {
            content: '';
            position: absolute;
            right: -5px;
            top: 50%;
            transform: translateY(-50%);
            border-left: 5px solid rgba(255,255,255,0.95);
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
        }

        .amount {
            position: absolute;
            right: -52px;
            background: rgba(255,255,255,0.95);
            color: #0B1628;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 18px;
            font-family: 'Inter', sans-serif;
            transition: bottom 0.7s cubic-bezier(.2,.9,.25,1.1);
            bottom: 98px;
            z-index: 25;
            white-space: nowrap;
            transform-origin: left center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }
        .amount::before {
            content: '';
            position: absolute;
            left: -5px;
            top: 50%;
            transform: translateY(-50%);
            border-right: 5px solid rgba(255,255,255,0.95);
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
        }

        /* ── INFO PANELS ──────────────────────────────────── */
        .info-panel {
            position: absolute;
            top: 28%;
            transform: translateY(-50%);
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 22px 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            min-width: 200px;
            display: none;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        }
        .info-panel.left  { right: 268px; }
        .info-panel.right { left: 268px; }

        .panel-title {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 14px;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(245,166,35,0.3);
        }
        .panel-item {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: rgba(255,255,255,0.85);
            margin-bottom: 9px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            white-space: nowrap;
        }
        .panel-item:last-child { margin-bottom: 0; }
        .panel-item .label { color: rgba(255,255,255,0.55); font-weight: 400; }
        .panel-item .value { color: #fff; font-weight: 600; flex-shrink: 0; }

        /* ── QR PANEL ─────────────────────────────────────── */
        .qr-panel {
            width: 0;
            overflow: hidden;
            opacity: 0;
            flex-shrink: 0;
            transition:
                width 0.6s cubic-bezier(.4,0,.2,1),
                opacity 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qr-panel.visible {
            width: 280px;
            opacity: 1;
        }
        .qr-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 24px;
            padding: 28px 24px 24px;
            text-align: center;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow:
                0 20px 60px rgba(0,0,0,0.5),
                0 0 0 1px rgba(255,255,255,0.05) inset;
            width: 260px;
        }
        .qr-card-label {
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gold);
            margin-bottom: 16px;
        }
        .qr-canvas-wrap {
            background: #fff;
            border-radius: 14px;
            padding: 12px;
            display: inline-block;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        #qrCanvas {
            display: block;
            width: 180px;
            height: 180px;
            image-rendering: pixelated;
        }
        .qr-card-cta {
            margin-top: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
        }
        .qr-card-url {
            margin-top: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            word-break: break-all;
            line-height: 1.4;
        }

        /* ── CONTROLS ─────────────────────────────────────── */
        .controls-overlay {
            position: fixed;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
            z-index: 1000;
            opacity: 0.25;
            transition: opacity 0.3s;
        }
        .controls-overlay:hover { opacity: 1; }
        .control-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            width: 38px;
            height: 38px;
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            backdrop-filter: blur(10px);
            transition: background 0.2s, transform 0.15s;
        }
        .control-btn:hover { transform: scale(1.1); background: rgba(255,255,255,0.2); }
        .control-btn.active { background: rgba(245,166,35,0.6); border-color: var(--gold); }

        /* ── RESPONSIVE SCALING ───────────────────────────── */
        .thermometer-container { transform: scale(1.0); }
        @media (min-width: 1920px) { .thermometer-container { transform: scale(1.15); } }
        @media (max-width: 1200px) { .thermometer-container { transform: scale(0.9); } }
        @media (max-width: 900px)  { .thermometer-container { transform: scale(0.75); } }
        @media (max-width: 650px)  { .thermometer-container { transform: scale(0.6);  } }
        @media (max-width: 480px)  { .thermometer-container { transform: scale(0.5);  } }
        @media (max-height: 700px) { .thermometer-container { transform: scale(0.8);  } }
        @media (max-height: 500px) { .thermometer-container { transform: scale(0.65); } }

        /* ── ANIMATIONS ───────────────────────────────────── */
        .amount-pulse { animation: pulse 0.7s ease-out; }
        @keyframes pulse {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.18); color: #27ae60; }
            100% { transform: scale(1); }
        }
        .therm-glow { animation: glow 1.2s ease-out; }
        @keyframes glow {
            0%   { filter: drop-shadow(0 0 8px rgba(79,195,247,0.9)); }
            100% { filter: none; }
        }

        /* ── MILESTONE BANNER ─────────────────────────────── */
        .milestone-banner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a3a6b 0%, #0d2545 100%);
            border: 1px solid rgba(245,166,35,0.5);
            color: white;
            padding: 32px 64px;
            border-radius: 24px;
            font-size: 34px;
            font-family: 'Anton', sans-serif;
            text-align: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 80px rgba(245,166,35,0.15);
        }
        .milestone-banner.show { animation: milestoneShow 3.5s ease-out forwards; }
        @keyframes milestoneShow {
            0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
            15%  { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
            25%  { transform: translate(-50%, -50%) scale(1); }
            80%  { opacity: 1; }
            100% { opacity: 0; }
        }

        /* ── CONFETTI ─────────────────────────────────────── */
        .confetti {
            position: fixed;
            top: -10px;
            z-index: 1999;
            pointer-events: none;
        }
        @keyframes confettiFall {
            0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg) scale(0.5); opacity: 0; }
        }

        /* ── FULLSCREEN ───────────────────────────────────── */
        .fullscreen-active { cursor: none; }
        .fullscreen-active .controls-overlay { opacity: 0; }
        .fullscreen-active:hover .controls-overlay { opacity: 0.25; }
    </style>
</head>
<body>
    <!-- Controls -->
    <div class="controls-overlay">
        <button class="control-btn" id="fullscreenBtn" onclick="toggleFullscreen()" title="Fullscreen (F)">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 4V1h3M10 1h3v3M13 10v3h-3M4 13H1v-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="control-btn" id="soundBtn" onclick="toggleSound()" title="Sound (S)">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 5h2l3-3v10L4 9H2a1 1 0 01-1-1V6a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M10 4.5a4 4 0 010 5M8.5 6a2 2 0 010 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <button class="control-btn" id="qrBtn" onclick="toggleQR()" title="QR Code (Q)">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="0.5" stroke="currentColor" stroke-width="1.5"/><rect x="8" y="1" width="5" height="5" rx="0.5" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="8" width="5" height="5" rx="0.5" stroke="currentColor" stroke-width="1.5"/><rect x="8.5" y="8.5" width="1.5" height="1.5" fill="currentColor"/><rect x="11" y="8.5" width="1.5" height="1.5" fill="currentColor"/><rect x="8.5" y="11" width="1.5" height="1.5" fill="currentColor"/><rect x="11" y="11" width="1.5" height="1.5" fill="currentColor"/></svg>
        </button>
    </div>

    <!-- Milestone banner -->
    <div class="milestone-banner" id="milestoneBanner"></div>

    <!-- Stage -->
    <div class="stage" id="stage">

        <!-- Thermometer wrapper -->
        <div class="therm-wrapper">
            <div class="thermometer-container" id="thermContainer">

                <!-- Left Info Panel -->
                <div class="info-panel left" id="leftPanel">
                    <div class="panel-title" id="leftPanelTitle">Left Panel</div>
                    <div id="leftPanelContent"></div>
                </div>

                <!-- Right Info Panel -->
                <div class="info-panel right" id="rightPanel">
                    <div class="panel-title" id="rightPanelTitle">Right Panel</div>
                    <div id="rightPanelContent"></div>
                </div>

                <div class="goal">Goal: $<span id="goalAmount">100,000</span></div>
                <div class="thermometer">
                    <!-- SVG thermometer: single connected shape, no junction artifacts -->
                    <!--
                        Geometry (SVG coords, y down from top, viewBox 0 0 210 560):
                        Outer: stem x=77-133, top semicircle r=28 centre(105,32), y=4–455.5
                               bulb circle centre(105,504) r=56
                        Inner: stem x=84-126, top semicircle r=21 centre(105,32), y=11–459.7
                               bulb circle centre(105,504) r=49
                        Fill bottom = 553 (inner bulb floor), total fill height = 542
                    -->
                    <svg id="thermSvg" class="therm-svg" viewBox="0 0 210 560" xmlns="http://www.w3.org/2000/svg">
                      <defs>
                        <clipPath id="thermInner">
                          <path d="M105,11 A21,21,0,0,1,126,32 L126,459.7 A49,49,0,1,1,84,459.7 L84,32 A21,21,0,0,1,105,11 Z"/>
                        </clipPath>
                      </defs>
                      <!-- Glass background tint -->
                      <path d="M105,4 A28,28,0,0,1,133,32 L133,455.5 A56,56,0,1,1,77,455.5 L77,32 A28,28,0,0,1,105,4 Z"
                            fill="rgba(255,255,255,0.06)" stroke="none"/>
                      <!-- Liquid fill — single rect clipped to interior; grows from bottom -->
                      <rect id="svgThermFill" x="0" y="553" width="210" height="0"
                            fill="#4FC3F7" clip-path="url(#thermInner)"/>
                      <!-- Glass outer border -->
                      <path d="M105,4 A28,28,0,0,1,133,32 L133,455.5 A56,56,0,1,1,77,455.5 L77,32 A28,28,0,0,1,105,4 Z"
                            fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="7"/>
                      <!-- Inner glass highlight -->
                      <path d="M105,11 A21,21,0,0,1,126,32 L126,459.7 A49,49,0,1,1,84,459.7 L84,32 A21,21,0,0,1,105,11 Z"
                            fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="4"/>
                      <!-- Tick marks (populated by createTicks()) -->
                    </svg>
                    <div class="liquid-surface" id="liquidSurface">
                        <div class="wave-container">
                            <div class="wave one"></div>
                            <div class="wave two"></div>
                        </div>
                    </div>
                    <div class="percentage" id="percentage">0%</div>
                    <div class="amount"     id="amount">$0</div>
                </div>
                <div class="fundraiser-title" id="fundraiserTitle">Set Title</div>
            </div>
        </div>

        <!-- QR Panel -->
        <div class="qr-panel" id="qrPanel">
            <div class="qr-card">
                <div class="qr-card-label">Scan to Donate</div>
                <div class="qr-canvas-wrap">
                    <canvas id="qrCanvas" width="360" height="360"></canvas>
                </div>
                <div class="qr-card-cta">Give Now</div>
                <div class="qr-card-url" id="qrUrlLabel"></div>
            </div>
        </div>

    </div>

    <script>
    var QRGen = {
        render: function(canvas, text) {
            var ctx = canvas.getContext('2d');
            if (!text) {
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                return;
            }
            try {
                var qr = qrcode(0, 'M');
                qr.addData(text);
                qr.make();
                var n = qr.getModuleCount();
                var sz = canvas.width;
                var cell = sz / n;
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, sz, sz);
                ctx.fillStyle = '#000';
                for (var r = 0; r < n; r++) {
                    for (var c = 0; c < n; c++) {
                        if (qr.isDark(r, c)) {
                            ctx.fillRect(Math.floor(c * cell), Math.floor(r * cell), Math.ceil(cell), Math.ceil(cell));
                        }
                    }
                }
            } catch(e) {
                console.error('QR generation failed', e);
                ctx.fillStyle = '#eee';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#999';
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('QR unavailable', canvas.width/2, canvas.height/2);
            }
        }
    };
    </script>

    <script>
        // ── STATE ──────────────────────────────────────────
        var lastTotal = 0;
        var lastPercentage = 0;
        var soundEnabled = false;
        var qrVisible = false;
        var celebratedMilestones = [];
        var broadcastChannel = null;
        var lastQRUrl = '';

        // ── BROADCAST ──────────────────────────────────────
        try {
            broadcastChannel = new BroadcastChannel('fundraiser-updates');
            broadcastChannel.onmessage = function(event) {
                if (event.data.type === 'resetMilestones') celebratedMilestones = [];
                else if (event.data.type === 'clearUrl') hideQRPanel();
                updateAll();
            };
        } catch(e) {}

        // ── CONTROLS ───────────────────────────────────────
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                document.body.classList.add('fullscreen-active');
            } else {
                document.exitFullscreen();
                document.body.classList.remove('fullscreen-active');
            }
        }
        function toggleSound() {
            soundEnabled = !soundEnabled;
            localStorage.setItem('displaySoundEnabled', soundEnabled);
            document.getElementById('soundBtn').classList.toggle('active', soundEnabled);
        }
        function toggleQR() {
            qrVisible = !qrVisible;
            localStorage.setItem('displayQRVisible', qrVisible);
            document.getElementById('qrBtn').classList.toggle('active', qrVisible);
            if (qrVisible) showQRPanel(); else hideQRPanel();
        }

        function showQRPanel() {
            var url = localStorage.getItem('campaignUrl');
            if (!url) { qrVisible = false; return; }
            var panel = document.getElementById('qrPanel');
            panel.classList.add('visible');
            document.getElementById('stage').classList.add('qr-open');
            // Only re-render if URL changed
            if (url !== lastQRUrl) {
                lastQRUrl = url;
                QRGen.render(document.getElementById('qrCanvas'), url);
                var label = url.replace(/^https?:\/\/(www\.)?/,'');
                if (label.length > 40) label = label.substring(0, 37) + '…';
                document.getElementById('qrUrlLabel').textContent = label;
            }
        }
        function hideQRPanel() {
            qrVisible = false;
            document.getElementById('qrBtn').classList.remove('active');
            document.getElementById('qrPanel').classList.remove('visible');
            document.getElementById('stage').classList.remove('qr-open');
            localStorage.setItem('displayQRVisible', false);
        }

        // ── SOUND ──────────────────────────────────────────
        function playDonationSound() {
            if (!soundEnabled) return;
            try {
                var ac = new (window.AudioContext || window.webkitAudioContext)();
                var osc = ac.createOscillator(), gain = ac.createGain();
                osc.connect(gain); gain.connect(ac.destination);
                osc.frequency.value = 880; osc.type = 'sine';
                gain.gain.setValueAtTime(0.25, ac.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.5);
                osc.start(ac.currentTime); osc.stop(ac.currentTime + 0.5);
            } catch(e) {}
        }
        function playCelebrationSound() {
            if (!soundEnabled) return;
            try {
                var ac = new (window.AudioContext || window.webkitAudioContext)();
                [523,659,784,1047].forEach(function(f,i) {
                    var o=ac.createOscillator(),g=ac.createGain();
                    o.connect(g);g.connect(ac.destination);
                    o.frequency.value=f;o.type='sine';
                    g.gain.setValueAtTime(0.2,ac.currentTime+i*0.15);
                    g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+i*0.15+0.3);
                    o.start(ac.currentTime+i*0.15);o.stop(ac.currentTime+i*0.15+0.3);
                });
            } catch(e) {}
        }

        // ── ANIMATIONS ─────────────────────────────────────
        function animateChange() {
            var a = document.getElementById('amount');
            var t = document.getElementById('thermContainer');
            a.classList.remove('amount-pulse'); t.classList.remove('therm-glow');
            void a.offsetWidth;
            a.classList.add('amount-pulse'); t.classList.add('therm-glow');
            playDonationSound();
        }

        function createConfetti() {
            var cols = ['#F5A623','#4FC3F7','#66BB6A','#EF5350','#AB47BC','#FFA726'];
            for (var i = 0; i < 60; i++) {
                (function(delay) {
                    setTimeout(function() {
                        var el = document.createElement('div');
                        el.className = 'confetti';
                        el.style.left = Math.random() * 100 + 'vw';
                        el.style.width = el.style.height = (Math.random() * 8 + 6) + 'px';
                        el.style.backgroundColor = cols[Math.floor(Math.random()*cols.length)];
                        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                        el.style.animation = 'confettiFall ' + (Math.random()*2+2) + 's ease-out forwards';
                        document.body.appendChild(el);
                        setTimeout(function(){el.remove();}, 4500);
                    }, delay);
                })(i * 40);
            }
        }

        function checkMilestones(pct) {
            [25,50,75,100].forEach(function(m) {
                if (pct >= m && lastPercentage < m && celebratedMilestones.indexOf(m) === -1) {
                    celebratedMilestones.push(m);
                    localStorage.setItem('celebratedMilestones', JSON.stringify(celebratedMilestones));
                    var goal = parseFloat(localStorage.getItem('fundraiserGoal')) || 100000;
                    var amt = (m/100)*goal;
                    var banner = document.getElementById('milestoneBanner');
                    banner.innerHTML = m === 100
                        ? '<div style="color:#F5A623;font-size:0.6em;margin-bottom:6px">GOAL ACHIEVED</div>' + formatCurrency(goal)
                        : '<div style="color:#F5A623;font-size:0.6em;margin-bottom:6px">' + m + '% MILESTONE</div>' + formatCurrency(amt);
                    banner.classList.remove('show'); void banner.offsetWidth; banner.classList.add('show');
                    createConfetti(); playCelebrationSound();
                }
            });
        }

        // ── TICKS ──────────────────────────────────────────
        // Stem straight inner section: y=32 to y=459.7 (top to bottom in SVG)
        var TICK_TOP = 32, TICK_BOT = 459.7;
        function createTicks() {
            var svg = document.getElementById('thermSvg');
            svg.querySelectorAll('.therm-tick').forEach(function(t) { t.remove(); });
            for (var i = 0; i <= 10; i++) {
                var y = TICK_TOP + i * (TICK_BOT - TICK_TOP) / 10;
                var major = i % 5 === 0;
                var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('class', 'therm-tick');
                line.setAttribute('x1', 84); line.setAttribute('y1', y);
                line.setAttribute('x2', major ? 100 : 93); line.setAttribute('y2', y);
                line.setAttribute('stroke', major ? 'rgba(255,255,255,0.45)' : 'rgba(255,255,255,0.25)');
                line.setAttribute('stroke-width', 2);
                svg.appendChild(line);
            }
        }

        function formatCurrency(n) { return '$' + Math.round(n).toLocaleString(); }

        // Mix hex colour 50% with white to produce the lighter wave-trough tint
        function lightenColor(hex) {
            hex = hex.replace('#', '');
            if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
            var r = Math.round(parseInt(hex.slice(0,2),16) * 0.5 + 127.5);
            var g = Math.round(parseInt(hex.slice(2,4),16) * 0.5 + 127.5);
            var b = Math.round(parseInt(hex.slice(4,6),16) * 0.5 + 127.5);
            return 'rgb('+r+','+g+','+b+')';
        }

        // ── CUSTOMIZATION ──────────────────────────────────
        function applyCustomization() {
            var saved = localStorage.getItem('thermometerCustomization');
            if (!saved) return;
            try {
                var cx = JSON.parse(saved);
                if (cx.backgroundColor) document.body.style.backgroundColor = cx.backgroundColor;
                if (cx.fillColor) {
                    var fill = cx.fillColor;
                    document.documentElement.style.setProperty('--fill', fill);
                    // Update SVG fill rect
                    var svgFill = document.getElementById('svgThermFill');
                    if (svgFill) svgFill.setAttribute('fill', fill);
                    var enc = fill.replace('#','%23');
                    var s = document.getElementById('customStyles');
                    if (s) s.remove();
                    s = document.createElement('style');
                    s.id = 'customStyles';
                    s.textContent = '.wave.one{background-image:url(\'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 28" preserveAspectRatio="none"><path d="M0 14 Q 6 6 12 14 T 24 14 T 36 14 T 48 14 V28 H0 Z" fill="'+enc+'"/></svg>\') !important}'
                        + '.wave.two{background-image:url(\'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 28" preserveAspectRatio="none"><path d="M0 17 Q 6 8 12 17 T 24 17 T 36 17 T 48 17 V28 H0 Z" fill="'+enc+'"/></svg>\') !important}';
                    document.head.appendChild(s);
                }
                var title = document.querySelector('.fundraiser-title');
                if (title) {
                    if (cx.titleColor) title.style.color = cx.titleColor;
                    if (cx.titleFont) title.style.fontFamily = '"' + cx.titleFont + '", cursive, sans-serif';
                    if (cx.titleSize) title.style.fontSize = cx.titleSize + 'px';
                    if (cx.titleDistance !== undefined) title.style.bottom = '-' + cx.titleDistance + 'px';
                }
            } catch(e) {}
        }

        // ── PANELS ─────────────────────────────────────────
        var lastPanelHash = '';
        function updatePanels() {
            ['left','right'].forEach(function(side) {
                var raw = localStorage.getItem(side + 'Panel');
                var panel = document.getElementById(side + 'Panel');
                var titleEl = document.getElementById(side + 'PanelTitle');
                var contentEl = document.getElementById(side + 'PanelContent');
                if (!raw) { panel.style.display = 'none'; return; }
                try {
                    var d = JSON.parse(raw);
                    if (d.active && d.items && d.items.length > 0) {
                        panel.style.display = 'block';
                        titleEl.textContent = d.title || (side.charAt(0).toUpperCase() + side.slice(1));
                        contentEl.innerHTML = d.items.map(function(it) {
                            if (!it.label && !it.value) return '';
                            return '<div class="panel-item"><span class="label">' + (it.label||'') + '</span><span class="value">' + (it.value||'') + '</span></div>';
                        }).join('');
                    } else { panel.style.display = 'none'; }
                } catch(e) { panel.style.display = 'none'; }
            });
        }

        // ── THERMOMETER UPDATE ─────────────────────────────
        function updateThermometer() {
            var total = parseFloat(localStorage.getItem('fundraiserTotal'));
            if (isNaN(total)) total = 0;
            var goal = parseFloat(localStorage.getItem('fundraiserGoal')) || 100000;
            var pct = Math.min((total / goal) * 100, 100);

            var title = localStorage.getItem('fundraiserTitle') || 'Set Title';
            document.getElementById('fundraiserTitle').textContent = title;
            document.getElementById('goalAmount').textContent = goal.toLocaleString();
            // SVG fill strategy:
            // The bulb is always filled (mercury reservoir). The STEM level maps to 0–100%.
            // Bulb inner: bottom y=553, top junction y=459.7  → always-filled height = 93.3
            // Stem inner: y=459.7 (bottom) to y=32 (top)      → pct-driven height  = 427.7
            var BULB_BOTTOM   = 553;
            var STEM_JUNCTION = 459.7;  // where stem inner meets bulb inner
            var STEM_TOP      = 11;     // very tip of inner clip path (semicircle apex)
            var BULB_H = BULB_BOTTOM - STEM_JUNCTION;          // 93.3 — always filled
            var STEM_H = STEM_JUNCTION - STEM_TOP;             // 448.7 — tracks pct

            var fillH  = BULB_H + (pct / 100) * STEM_H;
            var fillEl = document.getElementById('svgThermFill');
            if (fillEl) {
                fillEl.setAttribute('y', BULB_BOTTOM - fillH);
                fillEl.setAttribute('height', fillH);
            }

            document.getElementById('percentage').textContent = Math.round(pct) + '%';
            document.getElementById('amount').textContent = formatCurrency(total);

            // Wave surface sits at the top of the stem fill
            // At pct=0 it rests at the stem-bulb junction (100px from bottom)
            var waveBtm = 100 + (pct / 100) * STEM_H;
            var surf = document.getElementById('liquidSurface');
            surf.style.bottom = waveBtm + 'px';
            // Fade wave out before it enters the rounded top cap (stem inner top ≈ 528px from bottom)
            // Wave is 28px tall, so it starts clipping at waveBtm ≈ 500.
            // Hide it cleanly at 490 so the fill rect shows a solid full look.
            // Fade wave out before it enters the rounded cap.
            // Stem straight top ≈ 528px from bottom; wave is 28px tall, so it enters the curve at waveBtm≈500.
            // Hide at 505 (~90% fill) so the fill rect shows a clean solid top.
            surf.style.opacity = waveBtm > 505 ? '0' : '1';

            // Labels track the wave level; clamped above the bulb area (≥118px)
            var labelBottom = Math.max(118, waveBtm - 10);

            if (total > lastTotal && lastTotal > 0) { animateChange(); checkMilestones(pct); }
            lastTotal = total; lastPercentage = pct;

            // Refresh QR if URL changed
            if (qrVisible) {
                var url = localStorage.getItem('campaignUrl');
                if (url && url !== lastQRUrl) showQRPanel();
                if (!url) hideQRPanel();
            }
        }

        function updateAll() { updateThermometer(); updatePanels(); applyCustomization(); }

        // ── INIT ───────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', function() {
            createTicks();

            // Restore settings
            soundEnabled = localStorage.getItem('displaySoundEnabled') === 'true';
            document.getElementById('soundBtn').classList.toggle('active', soundEnabled);

            var savedQR = localStorage.getItem('displayQRVisible') === 'true';
            var hasCelebrated = localStorage.getItem('celebratedMilestones');
            if (hasCelebrated) try { celebratedMilestones = JSON.parse(hasCelebrated); } catch(e){}

            // Init lastTotal without triggering animation
            var init = parseFloat(localStorage.getItem('fundraiserTotal'));
            if (!isNaN(init)) {
                lastTotal = init;
                var g = parseFloat(localStorage.getItem('fundraiserGoal')) || 100000;
                lastPercentage = Math.min((init/g)*100, 100);
            }

            updateAll();

            if (savedQR && localStorage.getItem('campaignUrl')) {
                qrVisible = true;
                document.getElementById('qrBtn').classList.add('active');
                showQRPanel();
            }

            setInterval(updateAll, 1000);

            document.addEventListener('fullscreenchange', function() {
                if (!document.fullscreenElement) document.body.classList.remove('fullscreen-active');
            });
            document.addEventListener('keydown', function(e) {
                var k = e.key.toLowerCase();
                if (k === 'f') toggleFullscreen();
                else if (k === 's') toggleSound();
                else if (k === 'q') toggleQR();
            });
        });
    </script>
</body>
</html>
